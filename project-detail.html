<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали проекта | ИП Петров</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style/project-detail.css">
</head>
<body>
    <div class="loader-wrapper" id="loaderWrapper">
        <div class="loader"></div>
    </div>

    <div class="content-wrapper" id="contentWrapper" style="display: none;">
        <header class="site-header" id="siteHeader">
            <div class="container">
                <div class="header-inner">
                    <a href="index.html" class="logo-link">
                        <div class="logo-badge"><span class="logo-letter">П</span></div>
                        <div>
                            <div class="logo-title">ИП Петров</div>
                            <div class="logo-subtitle">Digital-агентство</div>
                        </div>
                    </a>
                </div>
            </div>
        </header>

        <div id="heroSection"></div>

        <div class="project-main">
            <div id="mainContent"></div>
        </div>

        <div id="lightbox" class="lightbox">
            <button class="lightbox-close" id="lightbox-close"><i class="fas fa-times"></i></button>
            <button class="lightbox-nav lightbox-prev" id="lightbox-prev"><i class="fas fa-chevron-left"></i></button>
            <button class="lightbox-nav lightbox-next" id="lightbox-next"><i class="fas fa-chevron-right"></i></button>
            <div class="lightbox-counter" id="lightbox-counter">1 / 3</div>
            <div class="lightbox-img-wrapper">
                <img id="lightbox-img" class="lightbox-img" src="">
                <div class="lightbox-caption" id="lightbox-caption"></div>
            </div>
        </div>
    </div>

    <script src="js/data/projects.js"></script>
    <script src="js/modules/lightbox.js"></script>
    <script>
        (function() {
            window.addEventListener('load', () => {
                setTimeout(() => {
                    const loader = document.getElementById('loaderWrapper');
                    const content = document.getElementById('contentWrapper');
                    if (loader) {
                        loader.classList.add('hidden');
                        setTimeout(() => {
                            loader.style.display = 'none';
                        }, 400);
                    }
                    if (content) {
                        content.style.display = 'block';
                    }
                }, 400);
            });

            window.addEventListener('scroll', () => {
                const header = document.getElementById('siteHeader');
                if (window.scrollY > 20) {
                    header.classList.add('header-scrolled');
                } else {
                    header.classList.remove('header-scrolled');
                }
            });

            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            
            function renderProjectDetail() {
                const project = projectsFullData[projectId];
                
                if (!project) {
                    document.getElementById('heroSection').innerHTML = `
                        <div style="text-align: center; padding: 120px 20px;">
                            <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #ef4444;"></i>
                            <h2 style="margin-top: 20px;">Проект не найден</h2>
                            <a href="index.html" style="display: inline-block; margin-top: 20px; background: #0ea5e9; color: white; padding: 12px 28px; border-radius: 12px; text-decoration: none;">Вернуться на главную</a>
                        </div>
                    `;
                    return;
                }
                
                document.getElementById('heroSection').innerHTML = `
                    <div class="project-hero">
                        <img src="${project.image}" alt="${project.title}" class="project-hero-image" onerror="this.src='photo/zaglushka.jpg'">
                        <div class="hero-overlay"></div>
                        <div class="hero-content">
                            <a href="index.html" class="back-link">
                                <i class="fas fa-arrow-left"></i> Назад к портфолио
                            </a>
                            <div class="project-category">${project.category}</div>
                            <h1 class="project-title">${project.title}</h1>
                            <div class="project-meta">
                                <span><i class="far fa-calendar-alt"></i> Год: ${project.year}</span>
                                <span><i class="far fa-clock"></i> Срок: ${project.duration}</span>
                            </div>
                        </div>
                    </div>
                `;
                
                let screenshotsHtml = '';
                if (project.screenshots && project.screenshots.length > 0) {
                    screenshotsHtml = `
                        <div class="screenshots-section">
                            <h3 class="screenshots-title">Скриншоты проекта</h3>
                            <div class="screenshots-grid">
                                ${project.screenshots.map((src, idx) => `
                                    <div class="screenshot-item" data-index="${idx}">
                                        <img src="${src}" alt="Скриншот ${idx+1}" loading="lazy">
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
      
                const projectIds = Object.keys(projectsFullData);
                const currentIndex = projectIds.indexOf(projectId);
                const prevId = currentIndex > 0 ? projectIds[currentIndex - 1] : null;
                const nextId = currentIndex < projectIds.length - 1 ? projectIds[currentIndex + 1] : null;
                let navHtml = '';
                if (prevId) {
                    navHtml += `
                        <a href="?id=${prevId}" class="nav-link">
                            <div class="nav-arrow"><i class="fas fa-arrow-left"></i></div>
                            <div>
                                <div style="font-size: 12px; color: #94a3b8;">Предыдущий</div>
                                <div style="font-weight: 600;">${projectsFullData[prevId].title}</div>
                            </div>
                        </a>
                    `;
                } else {
                    navHtml += '<div></div>';
                }
                if (nextId) {
                    navHtml += `
                        <a href="?id=${nextId}" class="nav-link">
                            <div style="text-align: right;">
                                <div style="font-size: 12px; color: #94a3b8;">Следующий</div>
                                <div style="font-weight: 600;">${projectsFullData[nextId].title}</div>
                            </div>
                            <div class="nav-arrow"><i class="fas fa-arrow-right"></i></div>
                        </a>
                    `;
                }
                
                document.getElementById('mainContent').innerHTML = `
                    <div class="project-content">
                        <div>
                            <div class="project-description">${project.description}</div>
                            <div class="info-cards">
                                <div class="info-card">
                                    <div class="info-icon"><i class="fas fa-bullseye"></i></div>
                                    <div>
                                        <div class="info-title">Задача</div>
                                        <div class="info-text">${project.challenge}</div>
                                    </div>
                                </div>
                                <div class="info-card">
                                    <div class="info-icon"><i class="fas fa-lightbulb"></i></div>
                                    <div>
                                        <div class="info-title">Решение</div>
                                        <div class="info-text">${project.solution}</div>
                                    </div>
                                </div>
                                <div class="info-card">
                                    <div class="info-icon"><i class="fas fa-chart-line"></i></div>
                                    <div>
                                        <div class="info-title">Результат</div>
                                        <div class="info-text">${project.result}</div>
                                    </div>
                                </div>
                            </div>
                            ${screenshotsHtml}
                        </div>
                        <div class="sidebar">
                            <div class="sidebar-card">
                                <div class="sidebar-title">Технологии и услуги</div>
                                <div class="tags">
                                    ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                                </div>
                            </div>
                            <div class="cta-card">
                                <div class="cta-title">Нужен похожий проект?</div>
                                <div class="cta-text">Расскажите о своей задаче — обсудим и сделаем предложение.</div>
                                <a href="index.html#contact" class="cta-button">Обсудить проект</a>
                            </div>
                        </div>
                    </div>
                    <div class="project-nav">
                        ${navHtml}
                    </div>
                `;
                document.querySelectorAll('.screenshot-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        const idx = parseInt(item.getAttribute('data-index'));
                        if (typeof openLightbox === 'function') {
                            openLightbox(project.screenshots, idx);
                        }
                    });
                });
                document.title = `${project.title} | ИП Петров`;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
            
            if (typeof initLightbox === 'function') initLightbox();
            renderProjectDetail();
        })();
    </script>
</body>
</html>
