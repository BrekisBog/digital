<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Вход в админ-панель | ИП Петров</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/login.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-badge">
                <span class="logo-letter">П</span>
            </div>
            <div class="logo-title">ИП Петров</div>
            <div class="logo-subtitle">Digital-агентство</div>
        </div>
        
        <div class="login-header">
            <h1>Вход в админ-панель</h1>
            <p>Управление чатами и заявками</p>
        </div>
        
        <div id="errorMessage" class="error-message" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText"></span>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Логин</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="admin" autocomplete="off" enterkeyhint="next">
                </div>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••" enterkeyhint="done">
                </div>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <span id="btnText">Войти в систему</span>
            </button>
        </form>
        
        <div class="demo-hint">
            <p>Тестовые данные для входа</p>
            <div class="demo-credentials">
                <span>Логин: admin</span>
                <span>Пароль: 123456</span>
            </div>
            <p style="margin-top: 12px; font-size: 11px; color: #cbd5e1;">
                Для менеджеров: manager1 / 123456
            </p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const errorMessageDiv = document.getElementById('errorMessage');
        const errorTextSpan = document.getElementById('errorText');
        
        function showError(message) {
            errorTextSpan.textContent = message;
            errorMessageDiv.style.display = 'flex';
            usernameInput.classList.add('error');
            passwordInput.classList.add('error');
            setTimeout(() => {
                errorMessageDiv.style.display = 'none';
                usernameInput.classList.remove('error');
                passwordInput.classList.remove('error');
            }, 4000);
        }
        
        function setLoading(isLoading) {
            if (isLoading) {
                loginBtn.disabled = true;
                btnText.innerHTML = '<span class="spinner"></span> Вход...';
            } else {
                loginBtn.disabled = false;
                btnText.textContent = 'Войти в систему';
            }
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (!username || !password) {
                showError('Пожалуйста, введите логин и пароль');
                return;
            }
            
            setLoading(true);
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/admin/index.html';
                } else {
                    showError(data.error || 'Неверный логин или пароль');
                }
            } catch (error) {
                console.error('Ошибка входа:', error);
                showError('Ошибка соединения с сервером. Проверьте, запущен ли сервер.');
            } finally {
                setLoading(false);
            }
        }
        
        loginForm.addEventListener('submit', handleLogin);
        
        usernameInput.addEventListener('input', () => {
            errorMessageDiv.style.display = 'none';
            usernameInput.classList.remove('error');
        });
        passwordInput.addEventListener('input', () => {
            errorMessageDiv.style.display = 'none';
            passwordInput.classList.remove('error');
        });
        
        usernameInput.focus();
    </script>
</body>
</html>
