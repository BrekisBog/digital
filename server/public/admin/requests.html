<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Заявки | Админ-панель</title>
    <link rel="stylesheet" href="/requests.css">
</head>
<body>
    <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Заявки</h2>
            <p>Управление обращениями</p>
            <div class="nav-links" id="navLinks">
                <a href="/admin/index.html">Чаты</a>
                <a href="/admin/requests.html" class="active">Заявки</a>
                <a href="/admin/managers.html" id="managersLink">Менеджеры</a>
            </div>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск по заявкам..." autocomplete="off">
        </div>
        
        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="Новая">Новые</button>
            <button class="filter-btn" data-filter="В работе">В работе</button>
            <button class="filter-btn" data-filter="Обработана">Обработана</button>
            <button class="filter-btn" data-filter="Закрыта">Закрыта</button>
        </div>
        
        <div class="search-results-info" id="searchResultsInfo" style="display: none;"></div>
        
        <div class="user-info" id="userInfo">
            <div class="user-avatar" id="userAvatar">A</div>
            <div class="user-details">
                <div class="user-name" id="userName">Загрузка...</div>
                <div class="user-role" id="userRole"></div>
            </div>
            <div class="user-badge" id="userBadge">...</div>
        </div>
        <div class="sessions-list" id="requestsList">
            <div class="empty-state">Загрузка...</div>
        </div>
    </div>
    
    <div class="content-area">
        <div class="content-header">
            <div class="content-header-left">
                <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileMenu()" aria-label="Открыть меню">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18"/>
                    </svg>
                </button>
                <h3 id="currentTitle">Выберите заявку</h3>
            </div>
            <button class="logout-btn" id="logoutBtn">Выйти</button>
        </div>
        <div class="requests-container" id="requestsContainer">
            <div class="empty-state">Выберите заявку из списка слева</div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentRequests = [];
        let currentRequestId = null;
        let pollInterval = null;
        let currentStatusFilter = 'all';
        let currentSearchQuery = '';
        let activeRequestElements = new Map();
        let isLoadingRequests = false;
        let isDetailLocked = false;
        
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
            document.body.style.overflow = sidebar.classList.contains('mobile-open') ? 'hidden' : '';
        }
        
        function closeMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sidebar.classList.remove('mobile-open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        function getStatusClassSmall(status) {
            const map = {
                'Новая': 'status-new-small',
                'В работе': 'status-working-small',
                'Обработана': 'status-processed-small',
                'Закрыта': 'status-closed-small'
            };
            return map[status] || 'status-new-small';
        }
        
        function getStatusClassFull(status) {
            const map = {
                'Новая': 'status-new',
                'В работе': 'status-working',
                'Обработана': 'status-processed',
                'Закрыта': 'status-closed'
            };
            return map[status] || 'status-new';
        }
        
        function filterRequests() {
            let filtered = [...currentRequests];
            if (currentStatusFilter !== 'all') {
                filtered = filtered.filter(r => r.status === currentStatusFilter);
            }
            if (currentSearchQuery.trim()) {
                const query = currentSearchQuery.toLowerCase();
                filtered = filtered.filter(r => 
                    r.client_name?.toLowerCase().includes(query) ||
                    r.client_contact?.toLowerCase().includes(query) ||
                    r.client_message?.toLowerCase().includes(query)
                );
            }
            return filtered;
        }
        
        function shouldShowRequest(request) {
            let show = true;
            if (currentStatusFilter !== 'all' && request.status !== currentStatusFilter) {
                show = false;
            }
            if (show && currentSearchQuery.trim()) {
                const query = currentSearchQuery.toLowerCase();
                show = (request.client_name?.toLowerCase().includes(query) ||
                    request.client_contact?.toLowerCase().includes(query) ||
                    request.client_message?.toLowerCase().includes(query));
            }
            return show;
        }
        
        function updateRequestsList(newRequests) {
            const container = document.getElementById('requestsList');
            const isAdmin = currentUser?.role === 'admin';
            const filteredRequests = filterRequests();
            const filteredIds = new Set(filteredRequests.map(r => r.id));
            
            for (const [id, element] of activeRequestElements.entries()) {
                if (!filteredIds.has(id)) {
                    element.remove();
                    activeRequestElements.delete(id);
                }
            }
            
            newRequests.forEach(request => {
                const show = shouldShowRequest(request);
                const isActive = currentRequestId === request.id;
                
                let element = activeRequestElements.get(request.id);
                
                if (show) {
                    if (!element) {
                        element = document.createElement('div');
                        element.className = `request-item ${isActive ? 'active' : ''}`;
                        element.setAttribute('data-request-id', request.id);
                        element.setAttribute('onclick', `selectRequest(${request.id})`);
                        container.appendChild(element);
                        activeRequestElements.set(request.id, element);
                    }
                    
                    element.className = `request-item ${isActive ? 'active' : ''}`;
                    element.innerHTML = `
                        <div class="request-name">
                            <span>${escapeHtml(request.client_name)}</span>
                            <span class="status-badge-small ${getStatusClassSmall(request.status)}">${request.status}</span>
                        </div>
                        <div class="request-preview">
                            ${escapeHtml(request.client_message?.substring(0, 45) || 'Нет сообщения')}
                        </div>
                        <div class="request-time">${new Date(request.created_at).toLocaleString()}</div>
                        ${isAdmin && request.manager_name ? `<div class="request-manager">Менеджер: ${escapeHtml(request.manager_name)}</div>` : ''}
                    `;
                } else if (element) {
                    element.remove();
                    activeRequestElements.delete(request.id);
                }
            });
            
            updateSearchInfo(filteredIds.size, newRequests.length);
            
            if (activeRequestElements.size === 0 && newRequests.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет заявок</div>';
                activeRequestElements.clear();
            } else if (activeRequestElements.size === 0 && newRequests.length > 0) {
                container.innerHTML = '<div class="empty-state">Нет заявок, соответствующих фильтру</div>';
                activeRequestElements.clear();
            } else {
                const emptyState = container.querySelector('.empty-state');
                if (emptyState) {
                    emptyState.remove();
                }
            }
        }
        
        function updateSearchInfo(filteredCount, totalCount) {
            const infoDiv = document.getElementById('searchResultsInfo');
            if (currentSearchQuery || currentStatusFilter !== 'all') {
                infoDiv.style.display = 'flex';
                infoDiv.innerHTML = `
                    <span>Найдено: ${filteredCount} из ${totalCount} заявок</span>
                    ${currentSearchQuery ? `<button class="clear-search" onclick="clearSearch()">Очистить</button>` : ''}
                `;
            } else {
                infoDiv.style.display = 'none';
            }
        }
        
        function clearSearch() {
            currentSearchQuery = '';
            document.getElementById('searchInput').value = '';
            if (currentRequests.length > 0) {
                updateRequestsList(currentRequests);
            }
        }
        
        function showMessage(text, isError = false) {
            const msg = document.createElement('div');
            msg.className = 'success-message';
            msg.style.background = isError ? '#ef4444' : '#22c55e';
            msg.textContent = text;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }
        
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/check');
                const data = await response.json();
                if (!data.authenticated) {
                    window.location.href = '/admin/login.html';
                    return;
                }
                currentUser = data.admin;
                
                // Скрываем вкладку "Менеджеры" для менеджеров
                const managersLink = document.getElementById('managersLink');
                if (managersLink) {
                    managersLink.style.display = currentUser.role === 'admin' ? '' : 'none';
                }
                
                updateUserInterface();
                await loadRequests();
                startPolling();
            } catch (error) {
                window.location.href = '/admin/login.html';
            }
        }
        
        function updateUserInterface() {
            if (!currentUser) return;
            const isAdmin = currentUser.role === 'admin';
            const avatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const userRole = document.getElementById('userRole');
            const userBadge = document.getElementById('userBadge');
            
            avatar.textContent = currentUser.username.charAt(0).toUpperCase();
            avatar.className = `user-avatar ${isAdmin ? 'admin' : 'manager'}`;
            userName.textContent = currentUser.username;
            userRole.textContent = isAdmin ? 'Администратор - видит все заявки' : 'Менеджер - видит свои заявки';
            userBadge.textContent = isAdmin ? 'Админ' : 'Менеджер';
            userBadge.className = `user-badge ${isAdmin ? 'admin' : 'manager'}`;
        }
        
        async function loadRequests() {
            if (isLoadingRequests) return;
            isLoadingRequests = true;
            
            try {
                const response = await fetch('/api/requests');
                const requests = await response.json();
                currentRequests = requests;
                updateRequestsList(requests);
                
                if (currentRequestId && !isDetailLocked) {
                    const updatedRequest = requests.find(r => r.id == currentRequestId);
                    if (updatedRequest) {
                        updateOpenRequestStatus(updatedRequest);
                    } else {
                        currentRequestId = null;
                        document.getElementById('requestsContainer').innerHTML = '<div class="empty-state">Выберите заявку из списка слева</div>';
                        document.getElementById('currentTitle').innerHTML = 'Выберите заявку';
                    }
                }
            } catch(e) { console.error(e); }
            finally {
                isLoadingRequests = false;
            }
        }
        
        function updateOpenRequestStatus(request) {
            const statusSpan = document.querySelector('.detail-status');
            const statusSelect = document.getElementById('statusSelect');
            
            if (statusSpan && statusSpan.innerText !== request.status) {
                statusSpan.className = `detail-status ${getStatusClassFull(request.status)}`;
                statusSpan.innerText = request.status;
                statusSpan.classList.add('status-updated');
                setTimeout(() => statusSpan.classList.remove('status-updated'), 500);
            }
            
            if (statusSelect && statusSelect.value !== request.status) {
                statusSelect.value = request.status;
            }
            
            document.getElementById('currentTitle').innerHTML = `Заявка #${request.id} - ${request.client_name}`;
        }
        
        async function selectRequest(id) {
            if (currentRequestId === id) return;
            
            isDetailLocked = true;
            currentRequestId = id;
            updateRequestsList(currentRequests);
            await loadRequestDetail(id);
            isDetailLocked = false;
            
            if (window.innerWidth <= 768) closeMobileMenu();
        }
        
        async function loadRequestDetail(id) {
            const request = currentRequests.find(r => r.id === id);
            if (!request) return;
            
            document.getElementById('currentTitle').innerHTML = `Заявка #${request.id} - ${request.client_name}`;
            const statuses = ['Новая', 'В работе', 'Обработана', 'Закрыта'];
            const isAdmin = currentUser?.role === 'admin';
            
            document.getElementById('requestsContainer').innerHTML = `
                <div class="request-detail">
                    <div class="detail-header">
                        <span class="detail-status ${getStatusClassFull(request.status)}">${request.status}</span>
                        <h2 class="detail-title">${escapeHtml(request.client_name)}</h2>
                        <div class="detail-meta">
                            <div>ID: ${request.id}</div>
                            <div>Создано: ${new Date(request.created_at).toLocaleString()}</div>
                            ${request.updated_at !== request.created_at ? `<div>Обновлено: ${new Date(request.updated_at).toLocaleString()}</div>` : ''}
                            ${isAdmin && request.manager_name ? `<div>Менеджер: ${request.manager_name}</div>` : ''}
                        </div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-section-title">Контактные данные</div>
                        <div class="detail-section-content">${escapeHtml(request.client_contact)}</div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-section-title">Сообщение</div>
                        <div class="detail-section-content" style="white-space: pre-wrap;">${escapeHtml(request.client_message || '—')}</div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-section-title">Изменить статус</div>
                        <select id="statusSelect" class="detail-status-select">
                            ${statuses.map(s => `<option value="${s}" ${request.status === s ? 'selected' : ''}>${s}</option>`).join('')}
                        </select>
                    </div>
                    <div class="detail-comment">
                        <div class="detail-section-title">Добавить комментарий</div>
                        <textarea id="commentText" rows="3" placeholder="Введите комментарий..."></textarea>
                        <div style="font-size: 12px; color: #94a3b8; margin-top: 8px;">Комментарий будет добавлен к сообщению</div>
                    </div>
                    <button class="btn-save" onclick="saveRequest(${request.id})">Сохранить изменения</button>
                </div>
            `;
        }
        
        async function saveRequest(id) {
            const btn = document.querySelector('.btn-save');
            const status = document.getElementById('statusSelect').value;
            const comment = document.getElementById('commentText').value;
            
            btn.disabled = true;
            btn.classList.add('saving');
            btn.textContent = 'Сохранение...';
            
            try {
                const statusResponse = await fetch(`/api/requests/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                if (!statusResponse.ok) throw new Error('Ошибка обновления статуса');
                
                if (comment.trim()) {
                    const commentResponse = await fetch(`/api/requests/${id}/comment`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ comment: comment.trim() })
                    });
                    if (!commentResponse.ok) throw new Error('Ошибка добавления комментария');
                }
                
                showMessage('Изменения сохранены');
                
                document.getElementById('commentText').value = '';
                await loadRequests();
                
            } catch(e) {
                console.error(e);
                showMessage(e.message || 'Ошибка сохранения', true);
            } finally {
                btn.disabled = false;
                btn.classList.remove('saving');
                btn.textContent = 'Сохранить изменения';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(() => {
                loadRequests();
            }, 5000);
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentStatusFilter = btn.dataset.filter;
                if (currentRequests.length > 0) {
                    updateRequestsList(currentRequests);
                }
            });
        });
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearchQuery = e.target.value;
            if (currentRequests.length > 0) {
                updateRequestsList(currentRequests);
            }
        });
        
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/admin/login.html';
        });
        
        window.addEventListener('resize', () => { 
            if (window.innerWidth > 768) closeMobileMenu(); 
        });
        
        checkAuth().then(() => {
            loadRequests();
            startPolling();
        });
    </script>
</body>
</html>
