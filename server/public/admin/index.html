<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Админ-панель чата</title>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Активные чаты</h2>
            <p>Клиенты онлайн</p>
            <div class="nav-links" id="navLinks">
                <a href="/admin/index.html" class="active">Чаты</a>
                <a href="/admin/requests.html">Заявки</a>
                <a href="/admin/managers.html" id="managersLink">Менеджеры</a>
            </div>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск по чатам..." autocomplete="off">
        </div>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="unread">Непрочитанные</button>
            <button class="filter-btn" data-filter="active">Активные</button>
        </div>
        
        <div class="search-results-info" id="searchResultsInfo" style="display: none;"></div>
        
        <div class="user-info" id="userInfo">
            <div class="user-avatar" id="userAvatar">A</div>
            <div class="user-details">
                <div class="user-name" id="userName">Загрузка...</div>
                <div class="user-role" id="userRole"></div>
            </div>
            <div class="user-badge" id="userBadge">...</div>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
    </div>
    
    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-header-left">
                <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileMenu()" aria-label="Открыть меню">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18"/>
                    </svg>
                </button>
                <div class="chat-header-info">
                    <h3 id="currentSessionName">Выберите чат</h3>
                    <div class="chat-manager-info" id="chatManagerInfo"></div>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn">Выйти</button>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="empty-state">Выберите чат из списка слева</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off" enterkeyhint="send">
            <button id="sendBtn">Отправить</button>
        </div>
    </div>

    <audio id="notificationSound" class="notification-sound">
        <source src="data:audio/wav;base64,U3RlYWx0aCBzb3VuZA==" type="audio/wav">
    </audio>

    <script>
        let currentSessionId = null;
        let pollInterval = null;
        let lastUnreadCount = {};
        let lastMessagesHash = {};
        let currentUser = null;
        let allSessions = [];
        let currentFilter = 'all';
        let currentSearchQuery = '';
        let isMobile = window.innerWidth <= 768;
        let activeSessionElements = new Map();
        let isLoadingSessions = false;
        
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
            document.body.style.overflow = sidebar.classList.contains('mobile-open') ? 'hidden' : '';
        }
        
        function closeMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sidebar.classList.remove('mobile-open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        async function selectSessionAndCloseMobile(sessionId) {
            await selectSession(sessionId);
            if (isMobile) closeMobileMenu();
        }
        
        function filterSessions(sessions) {
            let filtered = [...sessions];
            if (currentFilter === 'unread') {
                filtered = filtered.filter(s => s.unread_count > 0);
            } else if (currentFilter === 'active') {
                const oneDayAgo = Date.now() - 24 * 60 * 60 * 1000;
                filtered = filtered.filter(s => {
                    const lastActivity = new Date(s.last_activity).getTime();
                    return lastActivity > oneDayAgo;
                });
            }
            if (currentSearchQuery.trim()) {
                const query = currentSearchQuery.toLowerCase();
                filtered = filtered.filter(s => 
                    s.session_id.toLowerCase().includes(query) ||
                    (s.last_message && s.last_message.toLowerCase().includes(query)) ||
                    (s.manager_name && s.manager_name.toLowerCase().includes(query))
                );
            }
            return filtered;
        }
        
        function shouldShowSession(session) {
            return filterSessions([session]).length > 0;
        }
        
        function updateSessionsList(newSessions) {
            const container = document.getElementById('sessionsList');
            const isAdmin = currentUser?.role === 'admin';
            const filteredSessions = filterSessions(newSessions);
            const filteredIds = new Set(filteredSessions.map(s => s.session_id));
            
            for (const [sessionId, element] of activeSessionElements.entries()) {
                if (!filteredIds.has(sessionId)) {
                    element.remove();
                    activeSessionElements.delete(sessionId);
                }
            }
            
            newSessions.forEach(session => {
                const show = shouldShowSession(session);
                const hasUnread = session.unread_count > 0;
                const isActive = currentSessionId === session.session_id;
                
                let element = activeSessionElements.get(session.session_id);
                
                if (show) {
                    if (!element) {
                        element = document.createElement('div');
                        element.className = `session-item ${isActive ? 'active' : ''} ${hasUnread && session.session_id !== currentSessionId ? 'has-unread' : ''}`;
                        element.setAttribute('data-session-id', session.session_id);
                        element.setAttribute('onclick', `selectSessionAndCloseMobile('${session.session_id.replace(/'/g, "\\'")}')`);
                        container.appendChild(element);
                        activeSessionElements.set(session.session_id, element);
                    }
                    
                    element.className = `session-item ${isActive ? 'active' : ''} ${hasUnread && session.session_id !== currentSessionId ? 'has-unread' : ''}`;
                    element.innerHTML = `
                        <div class="session-name">
                            <span>${escapeHtml(session.session_id.substring(0, 25))}...</span>
                            ${hasUnread ? `<span class="unread-badge">${session.unread_count}</span>` : ''}
                        </div>
                        <div class="session-last-message">
                            ${session.last_message ? (session.last_message.length > 45 ? escapeHtml(session.last_message.substring(0, 45)) + '...' : escapeHtml(session.last_message)) : 'Нет сообщений'}
                        </div>
                        <div class="session-time">
                            ${session.last_activity ? new Date(session.last_activity).toLocaleString() : 'Нет активности'}
                        </div>
                        ${isAdmin && session.manager_name ? `<div class="session-manager">Менеджер: ${escapeHtml(session.manager_name)}</div>` : ''}
                    `;
                } else if (element) {
                    element.remove();
                    activeSessionElements.delete(session.session_id);
                }
            });
            
            updateSearchResultsInfo(filteredIds.size, newSessions.length);
            
            if (activeSessionElements.size === 0 && newSessions.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет активных чатов</div>';
                activeSessionElements.clear();
            } else if (activeSessionElements.size === 0 && newSessions.length > 0) {
                container.innerHTML = '<div class="empty-state">Нет чатов, соответствующих фильтру</div>';
                activeSessionElements.clear();
            } else {
                const emptyState = container.querySelector('.empty-state');
                if (emptyState) {
                    emptyState.remove();
                }
            }
        }
        
        function updateSearchResultsInfo(filteredCount, totalCount) {
            const infoDiv = document.getElementById('searchResultsInfo');
            if (currentSearchQuery || currentFilter !== 'all') {
                infoDiv.style.display = 'flex';
                infoDiv.innerHTML = `
                    <span>Найдено: ${filteredCount} из ${totalCount} чатов</span>
                    ${currentSearchQuery ? `<button class="clear-search" onclick="clearSearch()">Очистить</button>` : ''}
                `;
            } else {
                infoDiv.style.display = 'none';
            }
        }
        
        function clearSearch() {
            currentSearchQuery = '';
            document.getElementById('searchInput').value = '';
            if (allSessions.length > 0) {
                updateSessionsList(allSessions);
            }
        }
        
        function playNotification() {
            const audio = document.getElementById('notificationSound');
            if (audio) audio.play().catch(e => console.log('Audio play failed:', e));
        }
        
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/check');
                const data = await response.json();
                if (!data.authenticated) {
                    window.location.href = '/admin/login.html';
                    return;
                }
                currentUser = data.admin;
                
                // Скрываем вкладку "Менеджеры" для менеджеров
                const managersLink = document.getElementById('managersLink');
                if (managersLink) {
                    managersLink.style.display = currentUser.role === 'admin' ? '' : 'none';
                }
                
                updateUserInterface();
                await loadSessions();
                startPolling();
            } catch (error) {
                window.location.href = '/admin/login.html';
            }
        }
        
        function updateUserInterface() {
            if (!currentUser) return;
            const isAdmin = currentUser.role === 'admin';
            const avatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const userRole = document.getElementById('userRole');
            const userBadge = document.getElementById('userBadge');
            
            avatar.textContent = currentUser.username.charAt(0).toUpperCase();
            avatar.className = `user-avatar ${isAdmin ? 'admin' : 'manager'}`;
            userName.textContent = currentUser.username;
            userRole.textContent = isAdmin ? 'Администратор - видит все чаты' : 'Менеджер - видит свои чаты';
            userBadge.textContent = isAdmin ? 'Админ' : 'Менеджер';
            userBadge.className = `user-badge ${isAdmin ? 'admin' : 'manager'}`;
        }
        
        async function markMessagesAsRead() {
            if (!currentSessionId) return;
            try {
                await fetch('/api/admin/mark-read', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: currentSessionId })
                });
                lastUnreadCount[currentSessionId] = 0;
            } catch(e) {}
        }
        
        async function loadSessions() {
            if (isLoadingSessions) return;
            isLoadingSessions = true;
            
            try {
                const response = await fetch('/api/admin/sessions');
                const sessions = await response.json();
                
                for (const s of sessions) {
                    const prevUnread = lastUnreadCount[s.session_id] || 0;
                    if (s.unread_count > prevUnread && s.session_id !== currentSessionId) {
                        playNotification();
                    }
                    lastUnreadCount[s.session_id] = s.unread_count;
                }
                
                allSessions = sessions;
                updateSessionsList(sessions);
                
                if (currentSessionId) {
                    const stillExists = sessions.find(s => s.session_id === currentSessionId);
                    if (!stillExists) {
                        currentSessionId = null;
                        document.getElementById('messagesContainer').innerHTML = '<div class="empty-state">Выберите чат из списка слева</div>';
                        document.getElementById('currentSessionName').innerHTML = 'Выберите чат';
                        document.getElementById('chatManagerInfo').innerHTML = '';
                    }
                }
            } catch(e) { 
                console.error('Ошибка загрузки сессий:', e);
            } finally {
                isLoadingSessions = false;
            }
        }
        
        async function selectSession(sessionId) {
            if (currentSessionId === sessionId) return;
            
            currentSessionId = sessionId;
            document.getElementById('currentSessionName').innerHTML = `Чат: ${sessionId.substring(0, 35)}...`;
            
            const session = allSessions.find(s => s.session_id === sessionId);
            if (session && session.manager_name && currentUser?.role === 'admin') {
                document.getElementById('chatManagerInfo').innerHTML = `Менеджер: ${session.manager_name}`;
            } else {
                document.getElementById('chatManagerInfo').innerHTML = '';
            }
            
            document.getElementById('messagesContainer').innerHTML = '<div class="empty-state">Загрузка сообщений...</div>';
            
            await loadMessages();
            updateSessionsList(allSessions);
            
            setTimeout(() => {
                const container = document.getElementById('messagesContainer');
                if (container) container.scrollTop = container.scrollHeight;
            }, 100);
            
            await markMessagesAsRead();
            updateSessionsList(allSessions);
        }
        
        async function loadMessages() {
            if (!currentSessionId) return;
            
            try {
                const response = await fetch(`/api/admin/messages/${encodeURIComponent(currentSessionId)}`);
                const messages = await response.json();
                const container = document.getElementById('messagesContainer');
                
                const messagesHash = messages.map(m => `${m.id}_${m.message}_${m.created_at}`).join('|');
                if (lastMessagesHash[currentSessionId] === messagesHash && container.innerHTML !== '<div class="empty-state">Загрузка сообщений...</div>') return;
                lastMessagesHash[currentSessionId] = messagesHash;
                
                if (messages.length === 0) {
                    container.innerHTML = '<div class="empty-state">Напишите первое сообщение клиенту</div>';
                    return;
                }
                
                const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 100;
                
                container.innerHTML = messages.map(msg => `
                    <div class="message ${msg.sender}">
                        <div class="message-bubble">${escapeHtml(msg.message)}</div>
                        <div class="message-time">${new Date(msg.created_at).toLocaleString()}</div>
                    </div>
                `).join('');
                
                if (wasAtBottom || !container.scrollTop) {
                    container.scrollTop = container.scrollHeight;
                }
                
            } catch(e) { 
                console.error('Ошибка загрузки сообщений:', e);
                const container = document.getElementById('messagesContainer');
                container.innerHTML = '<div class="empty-state">Ошибка загрузки сообщений</div>';
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentSessionId) return;
            
            const container = document.getElementById('messagesContainer');
            const tempId = Date.now();
            const tempMsgDiv = document.createElement('div');
            tempMsgDiv.className = 'message admin';
            tempMsgDiv.id = `temp_msg_${tempId}`;
            tempMsgDiv.innerHTML = `
                <div class="message-bubble">${escapeHtml(text)}</div>
                <div class="message-time">Отправка...</div>
            `;
            container.appendChild(tempMsgDiv);
            container.scrollTop = container.scrollHeight;
            input.value = '';
            
            try {
                const response = await fetch('/api/admin/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: currentSessionId, message: text })
                });
                
                if (response.ok) {
                    const tempMsg = document.getElementById(`temp_msg_${tempId}`);
                    if (tempMsg) tempMsg.remove();
                    await loadMessages();
                    await loadSessions();
                    container.scrollTop = container.scrollHeight;
                } else {
                    tempMsgDiv.querySelector('.message-time').textContent = 'Ошибка отправки';
                    tempMsgDiv.querySelector('.message-bubble').style.background = '#fee2e2';
                    tempMsgDiv.querySelector('.message-bubble').style.color = '#dc2626';
                }
            } catch(e) { 
                console.error('Ошибка отправки:', e);
                tempMsgDiv.querySelector('.message-time').textContent = 'Ошибка соединения';
                tempMsgDiv.querySelector('.message-bubble').style.background = '#fee2e2';
                tempMsgDiv.querySelector('.message-bubble').style.color = '#dc2626';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                await loadSessions();
                if (currentSessionId) {
                    await loadMessages();
                    await markMessagesAsRead();
                    updateSessionsList(allSessions);
                }
            }, 5000);
        }
        
        window.addEventListener('resize', () => {
            isMobile = window.innerWidth <= 768;
            if (window.innerWidth > 768) closeMobileMenu();
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                if (allSessions.length > 0) {
                    updateSessionsList(allSessions);
                }
            });
        });
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearchQuery = e.target.value;
            if (allSessions.length > 0) {
                updateSessionsList(allSessions);
            }
        });
        
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/admin/login.html';
        });
        
        checkAuth();
    </script>
</body>
</html>
