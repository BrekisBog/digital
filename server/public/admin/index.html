<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель чата</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: #f1f5f9;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            background: #0d1b3e;
            color: white;
        }
        .sidebar-header h2 { font-size: 18px; margin-bottom: 4px; }
        .sidebar-header p { font-size: 12px; opacity: 0.7; }
        .user-info {
            background: #0a1429;
            padding: 10px 20px;
            border-bottom: 1px solid #1e2a4a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        .user-avatar.admin {
            background: #ef4444;
        }
        .user-avatar.manager {
            background: #0ea5e9;
        }
        .user-details {
            flex: 1;
        }
        .user-name {
            font-weight: 600;
            font-size: 14px;
            color: white;
        }
        .user-role {
            font-size: 10px;
            opacity: 0.7;
            color: white;
        }
        .user-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 500;
        }
        .user-badge.admin {
            background: #ef4444;
            color: white;
        }
        .user-badge.manager {
            background: #0ea5e9;
            color: white;
        }
        .nav-links {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-links a:hover {
            color: white;
            background: rgba(255,255,255,0.1);
        }
        .nav-links a.active {
            color: #0ea5e9;
            background: rgba(14,165,233,0.2);
        }
        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .session-item {
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            position: relative;
        }
        .session-item:hover { background: #f1f5f9; transform: translateX(4px); }
        .session-item.active { background: #e0f2fe; border-color: #0ea5e9; }
        .session-item.has-unread {
            background: #fef3c7;
            border-color: #f59e0b;
        }
        .session-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .session-last-message {
            font-size: 11px;
            color: #64748b;
            margin: 6px 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
        }
        .session-time { 
            font-size: 10px; 
            color: #94a3b8;
            margin-top: 4px;
        }
        .session-manager {
            font-size: 9px;
            color: #0ea5e9;
            margin-top: 3px;
        }
        .unread-badge {
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
        }
        .chat-header h3 { font-size: 16px; color: #0d1b3e; }
        .chat-header-info {
            display: flex;
            flex-direction: column;
        }
        .chat-manager-info {
            font-size: 11px;
            color: #0ea5e9;
            margin-top: 4px;
        }
        .logout-btn {
            padding: 8px 16px;
            background: #ef4444;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            border: none;
        }
        .logout-btn:hover { background: #dc2626; }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafcff;
        }
        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
        }
        .message.client { align-self: flex-start; }
        .message.admin { align-self: flex-end; }
        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .message.client .message-bubble {
            background: #eef2ff;
            color: #0f172a;
            border-bottom-left-radius: 4px;
        }
        .message.admin .message-bubble {
            background: #0ea5e9;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-time {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 4px;
            margin-left: 8px;
            margin-right: 8px;
        }
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            background: white;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }
        .input-area input:focus { outline: none; border-color: #0ea5e9; }
        .input-area button {
            padding: 12px 24px;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
        }
        .input-area button:hover { background: #0284c7; }
        .empty-state { text-align: center; padding: 40px; color: #94a3b8; }
        
        .session-id-text {
            font-size: 13px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 180px;
        }
        
        .notification-sound {
            display: none;
        }
    </style>
</head>
<body>
    <audio id="notificationSound" class="notification-sound">
        <source src="data:audio/wav;base64,U3RlYWx0aCBzb3VuZA==" type="audio/wav">
    </audio>
    
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Активные чаты</h2>
            <p>Клиенты онлайн</p>
            <div class="nav-links">
                <a href="/admin/index.html" class="active">Чаты</a>
                <a href="/admin/requests.html">Заявки</a>
            </div>
        </div>
        <div class="user-info" id="userInfo">
            <div class="user-avatar" id="userAvatar">A</div>
            <div class="user-details">
                <div class="user-name" id="userName">Загрузка...</div>
                <div class="user-role" id="userRole"></div>
            </div>
            <div class="user-badge" id="userBadge">...</div>
        </div>
        <div class="sessions-list" id="sessionsList">
            <div class="empty-state">Загрузка...</div>
        </div>
    </div>
    
    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-header-info">
                <h3 id="currentSessionName">Выберите чат</h3>
                <div class="chat-manager-info" id="chatManagerInfo"></div>
            </div>
            <button class="logout-btn" id="logoutBtn">Выйти</button>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="empty-state">Выберите чат из списка слева</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
            <button id="sendBtn">Отправить</button>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let pollInterval = null;
        let lastUnreadCount = {};
        let currentUser = null;
        
        function playNotification() {
            const audio = document.getElementById('notificationSound');
            if (audio) {
                audio.play().catch(e => console.log('Audio play failed:', e));
            }
        }
        
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/check');
                const data = await response.json();
                if (!data.authenticated) {
                    window.location.href = '/admin/login.html';
                } else {
                    currentUser = data.admin;
                    updateUserInterface();
                }
            } catch (error) {
                window.location.href = '/admin/login.html';
            }
        }
        
        function updateUserInterface() {
            if (!currentUser) return;
            
            const isAdmin = currentUser.role === 'admin';
            const avatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const userRole = document.getElementById('userRole');
            const userBadge = document.getElementById('userBadge');
            
            avatar.textContent = currentUser.username.charAt(0).toUpperCase();
            avatar.className = `user-avatar ${isAdmin ? 'admin' : 'manager'}`;
            userName.textContent = currentUser.username;
            userRole.textContent = isAdmin ? 'Администратор - видит все чаты' : 'Менеджер - видит только свои чаты';
            userBadge.textContent = isAdmin ? 'Админ' : 'Менеджер';
            userBadge.className = `user-badge ${isAdmin ? 'admin' : 'manager'}`;
        }
        
        async function markMessagesAsRead() {
            if (!currentSessionId) return;
            try {
                await fetch('/api/admin/mark-read', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: currentSessionId })
                });
                lastUnreadCount[currentSessionId] = 0;
                await loadSessions();
            } catch(e) {}
        }
        
        async function loadSessions() {
            try {
                const response = await fetch('/api/admin/sessions');
                const sessions = await response.json();
                
                const container = document.getElementById('sessionsList');
                if (sessions.length === 0) {
                    container.innerHTML = '<div class="empty-state">Нет активных чатов</div>';
                    return;
                }
                
                let newUnreadDetected = false;
                const isAdmin = currentUser?.role === 'admin';
                
                container.innerHTML = sessions.map(s => {
                    const hasUnread = s.unread_count > 0;
                    if (hasUnread && s.session_id !== currentSessionId) {
                        newUnreadDetected = true;
                    }
                    
                    return `
                        <div class="session-item ${currentSessionId === s.session_id ? 'active' : ''} ${hasUnread && s.session_id !== currentSessionId ? 'has-unread' : ''}" 
                             onclick="selectSession('${s.session_id.replace(/'/g, "\\'")}')">
                            <div class="session-name">
                                <span class="session-id-text">${s.session_id.substring(0, 25)}...</span>
                                ${hasUnread ? `<span class="unread-badge">${s.unread_count}</span>` : ''}
                            </div>
                            <div class="session-last-message">
                                ${s.last_message ? (s.last_message.length > 40 ? s.last_message.substring(0, 40) + '...' : s.last_message) : 'Нет сообщений'}
                            </div>
                            <div class="session-time">
                                ${s.last_activity ? new Date(s.last_activity).toLocaleString() : 'Нет активности'}
                            </div>
                            ${isAdmin && s.manager_name ? `<div class="session-manager">Менеджер: ${s.manager_name}</div>` : ''}
                        </div>
                    `;
                }).join('');
                
                for (const s of sessions) {
                    if (s.unread_count > 0 && lastUnreadCount[s.session_id] !== s.unread_count && s.session_id !== currentSessionId) {
                        if (lastUnreadCount[s.session_id] !== undefined) {
                            playNotification();
                        }
                        lastUnreadCount[s.session_id] = s.unread_count;
                    } else if (s.unread_count === 0) {
                        lastUnreadCount[s.session_id] = 0;
                    }
                }
                
                if (newUnreadDetected && !document.hasFocus()) {
                    document.title = 'Новые сообщения';
                    setTimeout(() => {
                        if (!document.hasFocus()) {
                            document.title = 'Админ-панель чата';
                        }
                    }, 5000);
                } else if (document.hasFocus()) {
                    document.title = 'Админ-панель чата';
                }
                
            } catch(e) { 
                console.error('Ошибка загрузки сессий:', e);
            }
        }
        
        async function selectSession(sessionId) {
            currentSessionId = sessionId;
            document.getElementById('currentSessionName').innerHTML = `Чат: ${sessionId.substring(0, 35)}...`;
            
            const response = await fetch('/api/admin/sessions');
            const sessions = await response.json();
            const session = sessions.find(s => s.session_id === sessionId);
            
            if (session && session.manager_name && currentUser?.role === 'admin') {
                document.getElementById('chatManagerInfo').innerHTML = `Менеджер: ${session.manager_name}`;
            } else {
                document.getElementById('chatManagerInfo').innerHTML = '';
            }
            
            await loadMessages();
            await loadSessions();
        }
        
        async function loadMessages() {
            if (!currentSessionId) return;
            
            try {
                const response = await fetch(`/api/admin/messages/${encodeURIComponent(currentSessionId)}`);
                const messages = await response.json();
                
                const container = document.getElementById('messagesContainer');
                if (messages.length === 0) {
                    container.innerHTML = '<div class="empty-state">Напишите первое сообщение клиенту</div>';
                    return;
                }
                
                const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 100;
                
                container.innerHTML = messages.map(msg => `
                    <div class="message ${msg.sender}">
                        <div class="message-bubble">${escapeHtml(msg.message)}</div>
                        <div class="message-time">${new Date(msg.created_at).toLocaleString()}</div>
                    </div>
                `).join('');
                
                if (wasAtBottom) {
                    container.scrollTop = container.scrollHeight;
                    await markMessagesAsRead();
                } else {
                    container.scrollTop = container.scrollTop;
                }
                
                const unreadMessages = messages.filter(m => m.sender === 'client' && !m.is_read);
                if (unreadMessages.length === 0) {
                    lastUnreadCount[currentSessionId] = 0;
                    await loadSessions();
                }
                
            } catch(e) { 
                console.error('Ошибка загрузки сообщений:', e);
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentSessionId) return;
            
            try {
                await fetch('/api/admin/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: currentSessionId, message: text })
                });
                
                input.value = '';
                await loadMessages();
                await loadSessions();
                
                const container = document.getElementById('messagesContainer');
                container.scrollTop = container.scrollHeight;
                
            } catch(e) { 
                console.error('Ошибка отправки:', e);
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, '');
        }
        
        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(() => {
                loadSessions();
                if (currentSessionId) loadMessages();
            }, 3000);
        }
        
        function setupScrollListener() {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            
            let scrollTimeout;
            container.addEventListener('scroll', async () => {
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(async () => {
                    const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;
                    if (isAtBottom) {
                        await markMessagesAsRead();
                        await loadSessions();
                    }
                }, 200);
            });
        }
        
        window.addEventListener('focus', () => {
            document.title = 'Админ-панель чата';
            loadSessions();
            if (currentSessionId) {
                loadMessages();
                const container = document.getElementById('messagesContainer');
                const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;
                if (isAtBottom) {
                    markMessagesAsRead();
                }
            }
        });
        
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch(e) {}
            window.location.href = '/admin/login.html';
        });
        
        checkAuth();
        startPolling();
        loadSessions();
        setupScrollListener();
    </script>
</body>
</html>
